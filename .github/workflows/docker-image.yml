name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - uses: actions/checkout@v4

    # Step 2: use maven
    - name: build package
      run: mvn clean package


    # Step 4: Build Docker image with multiple tags
    - name: Build Docker image
      run: |
        docker build . --file Dockerfile \
          --tag sarthakwaghpatil/insure-me:2.0 \
          --tag sarthakwaghpatil/insure-me:${{ github.sha }}

    # Step 5: Push Docker image
    - name: Push Docker image
      run: |
        docker push ${{ vars.DOCKER_USERNAME }}/insure-me:2.0
        docker push ${{ vars.DOCKER_USERNAME }}/insure-me:${{ github.sha }}
