name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - uses: actions/checkout@v4

    - name: Check Docker version
      run: docker --version

    # Step 2: Install Docker (runner already has Docker, but ensure latest)
    - name: Install Docker
      run: |
        sudo systemctl start docker
        sudo systemctl enable docker
        docker --version

    # Step 3: Give Docker permissions to current user
    - name: Configure Docker permissions
      run: |
        sudo usermod -aG docker $USER
        sudo chmod 666 /var/run/docker.sock

    # Step 4: Log in to DockerHub using secrets
    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 5: Build and tag Docker image
    - name: Build Docker image
      run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/my-image-name:latest

    # Step 6: Push Docker image
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/my-image-name:latest
