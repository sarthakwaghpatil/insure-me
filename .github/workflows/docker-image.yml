name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - uses: actions/checkout@v4

    # Step 2: Install Docker (runner already has Docker, but ensure latest)
    - name: Install Docker
      run: |
        sudo apt update
        sudo apt install -y docker.io
        sudo systemctl start docker
        sudo systemctl enable docker
        docker --version

    # Step 3: Give Docker permissions to current user
    - name: Configure Docker permissions
      run: |
        sudo usermod -aG docker $USER
        sudo chmod 666 /var/run/docker.sock

    # Step 4: Log in to DockerHub using secrets
    - name: Log in to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Step 5: Build and tag Docker image
    - name: Build Docker image
      run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/my-image-name:latest

    # Step 6: Push Docker image
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/my-image-name:latest
