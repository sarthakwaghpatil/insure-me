name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - uses: actions/checkout@v4

    # Step 2: use maven
    - name: build package
      run: mvn clean package
      
    - name: Log in to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Step 4: Build Docker image with multiple tags
    - name: Build Docker image
      run: |
        docker build . --file Dockerfile \
          --tag "${{ secrets.DOCKER_USERNAME }}"/insure-me:latest \
          --tag "${{ secrets.DOCKER_USERNAME }}"/insure-me:${{ github.sha }}

    # Step 5: Push Docker image
    - name: Push Docker image
      run: |
        docker push "${{ secrets.DOCKER_USERNAME }}"/insure-me:latest
        docker push "${{ secrets.DOCKER_USERNAME }}"/insure-me:${{ github.sha }}
