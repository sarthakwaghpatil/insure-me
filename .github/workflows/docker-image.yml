name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - uses: actions/checkout@v4

    # Step 2: Verify Docker is available
    - name: Check Docker version
      run: docker --version

    # Step 3: Log in to DockerHub using secrets
    - name: Log in to DockerHub
      run: 
        docker login -u ${{ secrets.DOCKER_USERNAME }}
        ${{ secrets.DOCKER_PASSWORD }}

    # Step 4: Build Docker image with multiple tags
    - name: Build Docker image
      run: |
        docker build . --file Dockerfile \
          --tag ${{ secrets.DOCKER_USERNAME }}/my-image-name:latest \
          --tag ${{ secrets.DOCKER_USERNAME }}/my-image-name:${{ github.sha }}

    # Step 5: Push Docker image
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-image-name:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/my-image-name:${{ github.sha }}
